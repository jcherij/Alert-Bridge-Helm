# Ingest API HPA — scales on CPU; bedside monitor integrations can burst
# during shift changes and mass admission events.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vitalbridge.fullname" . }}-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitalbridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vitalbridge.fullname" . }}-ingest
  minReplicas: {{ .Values.autoscaling.ingest.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.ingest.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.ingest.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

---
# Stream Processor HPA — scales with message backlog; processor throughput
# must keep pace with ingest volume to avoid Pub/Sub queue buildup.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vitalbridge.fullname" . }}-processor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitalbridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vitalbridge.fullname" . }}-processor
  minReplicas: {{ .Values.autoscaling.processor.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.processor.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.processor.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
