# Single service account shared across all VitalBridge pods.
# Annotated with the GCP SA email for Workload Identity — pods assume
# the GCP identity injected from Terraform outputs at deploy time.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vitalbridge-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitalbridge.labels" . | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpEmail | quote }}
automountServiceAccountToken: false
